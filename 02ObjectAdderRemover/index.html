<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
            background-color: #262626;
            overflow: hidden;
        }

        #threeJsContainer {
            width: 100%;
            height: 100%;
            display: block;
        }

        #btn-conatiner {
            position: absolute;
            top: 0;
            left: 0;
            height: 10vh;
            width: 100%;
        }

        @media screen and (max-width:600px){
            #btn-container{
               display: flex;
               flex-direction: column;
            }
        }

        .btn {
            padding: 5px 15px;
            margin: 5px 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .add {
            color: green;
        }
        .rem {
            color: red;
        }

    </style>
    <script type="module" src="./script.js"></script>
</head>
<body>
    <div id="btnContainer">
        <button class="btn add" onclick="addCube()">Add Cube</button>
        <button class="btn rem" onclick="removeCube()">Remove Cube</button>
    </div>

    <div id="threeJsContainer"></div>
</body>
</html>
