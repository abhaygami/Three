<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Cube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r127/three.min.js"></script>
    

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
        }

        #threeJsContainer {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <div id="threeJsContainer"></div>

    <script>
        let width = window.innerWidth;
        let height = window.innerHeight;

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x262626);

        // Camera
        const fov = 50;     // Field of view — how wide you can see
        const aspect = width / height;  // Screen ratio (width / height)
        const near = 0.1;       // Minimum visible distance
        const far = 100;        // Maximum visible distance

        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.set(0, 0, 10);  // The camera is moved back to position z = 10

        // Renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true
        });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.physicallyCorrectLights = true;
        renderer.shadowMapEnabled = true;

        // Cube
        const geometry = new THREE.BoxGeometry(2, 2, 2);    // 2 x 2 x 2 Block
        const material = new THREE.MeshBasicMaterial({ wireframe: true, color: 0x00ffff });
        // If wireframe is false then whole solid block will display, If true then Just outline will be displayed
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // Add renderer to container
        const container = document.querySelector('#threeJsContainer');
        container.append(renderer.domElement);

        window.addEventListener('resize', () => {
            // It makes UI responsive
            width = window.innerWidth;
            height = window.innerHeight;

            camera.aspect = width / height;

            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.render(scene, camera);
        });

        // Render
        renderer.render(scene, camera);

        function animate() {
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
